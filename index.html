<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Interactive Access</title>

<meta property="og:title" content="Private Interactive Access">
<meta property="og:description" content="Instant private access. Real-time connection. Secure and discreet.">
<meta property="og:type" content="website">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXXX');
</script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#0e0e0f;color:white;font-family:ui-sans-serif,system-ui,sans-serif;overflow-x:hidden;}
.bg-glow{position:fixed;inset:0;background:
radial-gradient(circle at 30% 20%, rgba(139,92,246,0.15), transparent 60%),
radial-gradient(circle at 70% 80%, rgba(99,102,241,0.12), transparent 60%);
animation:floatGlow 12s ease-in-out infinite alternate;z-index:-3;}
@keyframes floatGlow{0%{transform:translateY(0)}100%{transform:translateY(-20px) scale(1.05)}}
.spinner{animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>

<body class="antialiased">

<!-- AGE GATE -->
<div id="ageGate" class="fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center z-[999] px-6">
<div class="max-w-md w-full bg-[#0e0e0f] border border-white/10 rounded-3xl p-10 text-center">
<h2 class="text-xl font-semibold mb-4">Age Verification Required</h2>
<p class="text-sm text-white/50 mb-8">You must be 18+ to enter.</p>
<div class="flex flex-col gap-4">
<button onclick="enterSite()" class="bg-gradient-to-r from-violet-600 to-indigo-600 py-4 rounded-xl font-semibold">I Am 18+</button>
<button onclick="exitSite()" class="border border-white/10 py-4 rounded-xl text-white/60">Exit</button>
</div>
</div>
</div>

<!-- EXIT INTENT -->
<div id="exitPopup" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[998] px-6">
<div class="max-w-md w-full bg-[#0e0e0f] border border-white/10 rounded-3xl p-8 text-center">
<h3 class="text-lg font-semibold mb-4">Wait — Exclusive Access</h3>
<p class="text-sm text-white/50 mb-6">Unlock private session access instantly.</p>
<button onclick="forceRedirect()" class="bg-gradient-to-r from-violet-600 to-indigo-600 py-4 rounded-xl w-full font-semibold">
Continue Now
</button>
</div>
</div>

<div class="bg-glow"></div>

<section class="flex flex-col items-center justify-center px-6 py-24 min-h-screen">
<div class="max-w-md w-full bg-white/[0.03] backdrop-blur-3xl border border-white/[0.08] rounded-[2.5rem] p-10 text-center">

<h1 class="text-2xl font-semibold mb-4">
Private Interactive Access
</h1>

<p class="text-sm text-white/50 mb-10">
Instant private access. Real-time connection. Secure and discreet.
</p>

<div class="flex flex-col gap-4">

<button id="liveBtn" onclick="goLive()"
class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 py-5 rounded-2xl font-bold flex items-center justify-center gap-3">
<span id="liveText">Enter Live Now</span>
<div id="liveSpinner" class="hidden">
<svg class="spinner w-5 h-5 text-white" fill="none" viewBox="0 0 24 24">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
</svg>
</div>
</button>

<button id="aiBtn" onclick="goAI()"
class="w-full border border-white/10 text-white/70 py-5 rounded-2xl">
<span id="aiText">Start AI Companion</span>
</button>

</div>
</div>
</section>

<footer class="w-full border-t border-white/[0.06] py-8 px-6 text-center pb-16">
<div class="text-[11px] text-white/40 uppercase tracking-[0.25em]">
<a href="privacy.html" class="hover:text-white">Privacy Policy</a>
<span class="mx-4 text-white/10">•</span>
<a href="terms.html" class="hover:text-white">Terms of Service</a>
</div>
</footer>

<script>
const OFFERS=[
"https://t.mbjms.com/406438/3664/0?...",
"https://t.mbjms.com/406438/9403/0?..."
];

function pickOffer(){
return OFFERS[Math.floor(Math.random()*OFFERS.length)];
}

let selectedOffer=pickOffer();

function goLive(){
gtag('event','click',{event_category:'engagement',event_label:'live'});
startLoading('liveBtn','liveText','liveSpinner','Connecting...');
setTimeout(()=>{redirectMasked();},500);
}

function goAI(){
gtag('event','click',{event_category:'engagement',event_label:'ai'});
redirectMasked();
}

function redirectMasked(){
window.location.href=selectedOffer;
}

function forceRedirect(){
redirectMasked();
}

function startLoading(btnId,textId,spinnerId,msg){
document.getElementById(textId).innerText=msg;
document.getElementById(spinnerId).classList.remove('hidden');
document.getElementById(btnId).disabled=true;
}

function enterSite(){
localStorage.setItem("ageVerified","true");
document.getElementById("ageGate").style.display="none";
history.pushState(null,null,location.href);
}

function exitSite(){
window.location.href="https://www.google.com";
}

if(localStorage.getItem("ageVerified")==="true"){
document.getElementById("ageGate").style.display="none";
}

document.addEventListener("mouseout",function(e){
if(e.clientY<0){
document.getElementById("exitPopup").classList.remove("hidden");
}
});

window.addEventListener("popstate",function(){
document.getElementById("exitPopup").classList.remove("hidden");
});
</script>

</body>
</html>
